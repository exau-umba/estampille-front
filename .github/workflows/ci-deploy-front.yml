name: Front CI & Deploy

on:
  pull_request:
    paths:
      - '**'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Front CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build front
        run: npm run build

      - name: Upload front artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-dist
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy front
    needs: ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download front artifact
        uses: actions/download-artifact@v4
        with:
          name: front-dist
          path: dist

      - name: Prepare target directory over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            mkdir -p "${{ secrets.FRONT_DIST_PATH }}"
            find "${{ secrets.FRONT_DIST_PATH }}" -mindepth 1 -delete

      - name: Copy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "dist/*"
          target: ${{ secrets.FRONT_DIST_PATH }}
          strip_components: 1
